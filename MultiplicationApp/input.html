<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Multiplication Table Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131c;
      --border: #1e1e2e;
      --accent: #f7c948;
      --accent2: #e84393;
      --text: #e8e8f0;
      --muted: #5a5a7a;
      --font-display: 'Bebas Neue', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.6;
      z-index: 0;
    }

    /* Glowing orbs */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(247,201,72,0.07) 0%, transparent 70%);
      top: -100px;
      right: -100px;
      z-index: 0;
      pointer-events: none;
    }

    .orb2 {
      position: fixed;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(232,67,147,0.06) 0%, transparent 70%);
      bottom: -80px;
      left: -80px;
      z-index: 0;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      width: 420px;
      padding: 0;
      clip-path: polygon(0 0, calc(100% - 24px) 0, 100% 24px, 100% 100%, 24px 100%, 0 calc(100% - 24px));
      box-shadow:
        0 0 0 1px #1e1e2e,
        0 32px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.04);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      padding: 32px 36px 24px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }
    .badge::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    h1 {
      font-family: var(--font-display);
      font-size: 52px;
      letter-spacing: 0.04em;
      line-height: 0.95;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .corner-deco {
      position: absolute;
      top: 0; right: 0;
      width: 24px; height: 24px;
      background: var(--accent);
      clip-path: polygon(0 0, 100% 0, 100% 100%);
    }

    .card-body {
      padding: 32px 36px 36px;
    }

    .field-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      display: block;
    }

    .input-wrapper {
      position: relative;
      margin-bottom: 28px;
    }

    .input-prefix {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--accent);
      font-family: var(--font-display);
      letter-spacing: 0.05em;
      border-right: 1px solid var(--border);
      pointer-events: none;
      transition: color 0.2s;
    }

    input[type="number"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 22px;
      padding: 14px 16px 14px 64px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -moz-appearance: textfield;
      appearance: textfield;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(247,201,72,0.12);
    }

    input[type="number"]:focus + .input-prefix,
    .input-wrapper:focus-within .input-prefix {
      color: var(--accent);
    }

    .btn {
      display: block;
      width: 100%;
      background: var(--accent);
      color: #0a0a0f;
      font-family: var(--font-display);
      font-size: 22px;
      letter-spacing: 0.1em;
      border: none;
      padding: 16px 24px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
      transition: background 0.2s, transform 0.1s;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.25) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .btn:hover {
      background: #ffd966;
    }
    .btn:hover::after {
      transform: translateX(100%);
    }
    .btn:active {
      transform: scale(0.98);
    }

    .hint {
      margin-top: 20px;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .hint::before {
      content: '×';
      font-size: 18px;
      color: var(--accent2);
      line-height: 1;
    }

    /* Floating math symbols */
    .floaters {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .floater {
      position: absolute;
      font-family: var(--font-display);
      font-size: 80px;
      color: rgba(255,255,255,0.015);
      animation: float linear infinite;
      user-select: none;
    }
    @keyframes float {
      from { transform: translateY(110vh) rotate(-10deg); }
      to   { transform: translateY(-10vh) rotate(10deg); }
    }
  </style>
</head>
<body>
  <div class="orb2"></div>

  <div class="floaters">
    <span class="floater" style="left:5%;  animation-duration:18s; animation-delay:0s;   font-size:120px;">×</span>
    <span class="floater" style="left:20%; animation-duration:24s; animation-delay:-6s;  font-size:60px;">÷</span>
    <span class="floater" style="left:40%; animation-duration:20s; animation-delay:-12s; font-size:90px;">∑</span>
    <span class="floater" style="left:60%; animation-duration:16s; animation-delay:-3s;  font-size:70px;">×</span>
    <span class="floater" style="left:75%; animation-duration:22s; animation-delay:-9s;  font-size:100px;">∞</span>
    <span class="floater" style="left:88%; animation-duration:19s; animation-delay:-15s; font-size:65px;">÷</span>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="corner-deco"></div>
      <div class="badge">Math Tool · v2</div>
      <h1>MULTIPLY<br/><span>TABLE</span></h1>
    </div>

    <div class="card-body">
      <form action="table.jsp" method="post">
        <label class="field-label" for="number">Enter your number</label>
        <div class="input-wrapper">
          <input type="number" id="number" name="number" placeholder="e.g. 7" required autocomplete="off"/>
          <div class="input-prefix">N</div>
        </div>
        <button type="submit" class="btn">GENERATE TABLE</button>
        <p class="hint">Generates a full 1–10 multiplication table</p>
      </form>
    </div>
  </div>
</body>
</html>
